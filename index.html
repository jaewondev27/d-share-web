<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D-Share Web Host</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: Roboto, sans-serif; background: #fff; color: #1a1a1a; padding: 24px;
    }
    .card { max-width: 420px; width: 100%; text-align: center; }
    h1 { font-size: 28px; margin: 0 0 8px; }
    p { color: #8a8a8a; line-height: 1.6; font-size: 14px; }
    label { display: block; text-align: left; margin: 24px 0 8px; font-size: 13px; color: #666; }
    input {
      width: 100%; padding: 14px 16px; border: 1px solid #ddd; border-radius: 16px;
      font-size: 16px; outline: none;
    }
    input:focus { border-color: #5b58e7; }
    button {
      width: 100%; margin-top: 16px; padding: 14px; border: 0; border-radius: 28px;
      background: #1a1a2e; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
    }
    .hint { margin-top: 20px; color: #5b58e7; font-size: 13px; }
    code { background: #f3f3ff; padding: 2px 6px; border-radius: 6px; }
  </style>
  <script>
    (function () {
      const ip = new URLSearchParams(location.search).get('ip');
      if (ip && /^\d{1,3}(\.\d{1,3}){3}$/.test(ip)) {
        location.replace('http://' + ip + ':3849/');
      }
    })();
  </script>
</head>
<body>
  <div class="card">
    <h1>D-Share Web Host</h1>
    <p>별도 서버 없이 <strong>같은 Wi-Fi</strong>에서 LAN으로 연결합니다.<br>
      클라이언트 앱에 표시된 주소로 이동하세요.</p>

    <label for="ip">클라이언트 IP (앱에 표시됨)</label>
    <input id="ip" inputmode="decimal" placeholder="예: 192.168.0.12" autocomplete="off" />
    <button type="button" id="go">웹 호스트 열기</button>

    <p class="hint">클라이언트 앱 → <code>http://IP:3849</code> 주소 확인<br>코드만 입력하면 화면 공유</p>
  </div>
  <script>
    const input = document.getElementById('ip');
    const saved = localStorage.getItem('dshare-client-ip');
    if (saved) input.value = saved;
    document.getElementById('go').onclick = () => {
      const ip = input.value.trim();
      if (!/^\d{1,3}(\.\d{1,3}){3}$/.test(ip)) {
        alert('클라이언트 IP를 입력하세요.');
        return;
      }
      localStorage.setItem('dshare-client-ip', ip);
      location.href = 'http://' + ip + ':3849/';
    };
  </script>
</body>
</html>
