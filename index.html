<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D-Share Web Host</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: Roboto, sans-serif; background: #fff; color: #1a1a1a; padding: 24px;
    }
    .card { max-width: 420px; width: 100%; text-align: center; }
    h1 { font-size: 28px; margin: 0 0 8px; }
    p { color: #8a8a8a; line-height: 1.6; font-size: 14px; }
    .spinner {
      width: 44px; height: 44px; margin: 28px auto 12px;
      border: 3px solid #ececff; border-top-color: #5b58e7; border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status { color: #5b58e7; font-size: 14px; min-height: 20px; }
    .manual { display: none; margin-top: 24px; text-align: left; }
    .manual.show { display: block; }
    label { display: block; margin: 0 0 8px; font-size: 13px; color: #666; }
    input {
      width: 100%; padding: 14px 16px; border: 1px solid #ddd; border-radius: 16px;
      font-size: 16px; outline: none;
    }
    button {
      width: 100%; margin-top: 12px; padding: 14px; border: 0; border-radius: 28px;
      background: #1a1a2e; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
    }
    .hint { margin-top: 16px; color: #aaa; font-size: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>D-Share Web Host</h1>
    <p>같은 Wi-Fi에서 클라이언트를 자동으로 찾습니다.</p>
    <div class="spinner" id="spinner"></div>
    <p class="status" id="status">기기를 찾는 중…</p>

    <div class="manual" id="manual">
      <label for="ip">클라이언트 IP (자동 검색 실패 시)</label>
      <input id="ip" inputmode="decimal" placeholder="예: 192.168.0.12" />
      <button type="button" id="go">직접 연결</button>
      <p class="hint">클라이언트 앱이 실행 중인지 확인하세요.</p>
    </div>
  </div>
  <script>
    const WEB_PORT = 3849;
    const statusEl = document.getElementById('status');
    const manualEl = document.getElementById('manual');
    const spinnerEl = document.getElementById('spinner');

    function redirect(ip) {
      localStorage.setItem('dshare-client-ip', ip);
      location.replace('http://' + ip + ':' + WEB_PORT + '/');
    }

    function isPrivateIp(ip) {
      return /^(192\.168\.|10\.|172\.(1[6-9]|2\d|3[01])\.)/.test(ip);
    }

    async function probeClient(ip) {
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 500);
      try {
        const res = await fetch('http://' + ip + ':' + WEB_PORT + '/api/info', {
          signal: ctrl.signal,
          mode: 'cors',
        });
        if (!res.ok) return null;
        const info = await res.json();
        if (info.service === 'd-share' && info.code) return info.lanIp || ip;
      } catch (_) { /* ignore */ }
      finally { clearTimeout(timer); }
      return null;
    }

    function getLocalIpViaWebRtc() {
      return new Promise((resolve) => {
        const ips = new Set();
        let done = false;
        const finish = () => {
          if (done) return;
          done = true;
          try { pc.close(); } catch (_) {}
          const list = [...ips].filter(isPrivateIp);
          resolve(list[0] || [...ips][0] || null);
        };
        const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
        pc.createDataChannel('dshare');
        pc.onicecandidate = (e) => {
          if (!e.candidate) { finish(); return; }
          const m = e.candidate.candidate.match(/(\d+\.\d+\.\d+\.\d+)/);
          if (m) ips.add(m[1]);
        };
        pc.createOffer()
          .then((o) => pc.setLocalDescription(o))
          .catch(finish);
        setTimeout(finish, 2500);
      });
    }

    async function scanSubnet(baseIp) {
      const parts = baseIp.split('.').map(Number);
      if (parts.length !== 4) return null;
      const prefix = parts[0] + '.' + parts[1] + '.' + parts[2];
      const saved = localStorage.getItem('dshare-client-ip');
      const ips = [];
      if (saved && isPrivateIp(saved)) ips.push(saved);
      ips.push(baseIp);
      for (let i = 1; i <= 254; i++) {
        const ip = prefix + '.' + i;
        if (!ips.includes(ip)) ips.push(ip);
      }
      const batch = 40;
      for (let i = 0; i < ips.length; i += batch) {
        statusEl.textContent = '기기를 찾는 중… (' + Math.min(i + batch, ips.length) + '/' + ips.length + ')';
        const chunk = ips.slice(i, i + batch);
        const results = await Promise.all(chunk.map(probeClient));
        const found = results.find(Boolean);
        if (found) return found;
      }
      return null;
    }

    async function autoDiscover() {
      const qIp = new URLSearchParams(location.search).get('ip');
      if (qIp && isPrivateIp(qIp)) {
        statusEl.textContent = '연결 중…';
        const ok = await probeClient(qIp);
        if (ok) return redirect(ok);
      }

      const saved = localStorage.getItem('dshare-client-ip');
      if (saved && isPrivateIp(saved)) {
        statusEl.textContent = '저장된 기기 확인 중…';
        const ok = await probeClient(saved);
        if (ok) return redirect(ok);
      }

      statusEl.textContent = '네트워크 확인 중…';
      const localIp = await getLocalIpViaWebRtc();
      if (localIp) {
        statusEl.textContent = '같은 Wi-Fi에서 검색 중…';
        const found = await scanSubnet(localIp);
        if (found) return redirect(found);
      }

      spinnerEl.style.display = 'none';
      statusEl.textContent = '자동으로 기기를 찾지 못했습니다.';
      manualEl.classList.add('show');
      const input = document.getElementById('ip');
      if (saved) input.value = saved;
      document.getElementById('go').onclick = async () => {
        const ip = input.value.trim();
        if (!/^\d{1,3}(\.\d{1,3}){3}$/.test(ip)) {
          alert('IP를 입력하세요.');
          return;
        }
        statusEl.textContent = '연결 중…';
        manualEl.classList.remove('show');
        spinnerEl.style.display = 'block';
        const ok = await probeClient(ip);
        if (ok) redirect(ok);
        else {
          spinnerEl.style.display = 'none';
          statusEl.textContent = '연결할 수 없습니다.';
          manualEl.classList.add('show');
        }
      };
    }

    autoDiscover();
  </script>
</body>
</html>
